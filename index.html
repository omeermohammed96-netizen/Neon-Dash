<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Neon Speed Runner</title>
    <style>
        * { user-select: none; -webkit-tap-highlight-color: transparent; touch-action: none; margin: 0; padding: 0; box-sizing: border-box; }
        body { margin: 0; padding: 0; overflow: hidden; background-color: #050010; width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; font-family: Arial, sans-serif; position: fixed; }
        canvas { display: block; width: 100vw; height: 100vh; }
        #gameOverUI { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(5, 0, 16, 0.95); border: 2px solid #00f2ff; padding: 25px; border-radius: 20px; text-align: center; color: white; box-shadow: 0 0 40px rgba(0, 242, 255, 0.4); min-width: 280px; z-index: 100; }
        .score-box { margin: 15px 0; background: rgba(255,255,255,0.05); padding: 15px; border-radius: 12px; }
        button { background: #00f2ff; border: none; padding: 15px; border-radius: 30px; font-size: 18px; font-weight: bold; color: #050010; cursor: pointer; width: 100%; transition: 0.3s; margin-bottom: 10px; -webkit-appearance: none; }
        #reviveBtn { background: #ffcc00; color: #000; display: none; }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div id="gameOverUI">
        <h1 id="statusTitle">GAME OVER</h1>
        <p>انتهت اللعبة</p>
        <div class="score-box">
            <div id="currentScore" style="font-size: 26px; color: #00f2ff;">0m</div>
            <div id="bestScore" style="color: #ffcc00;">Best: 0m</div>
        </div>
        <button id="reviveBtn" onclick="reviveAction()">AD: REVIVE / إحياء</button>
        <button onclick="location.reload()">RETRY / إعادة</button>
    </div>
    <script src="game.js"></script>
</body>
</html>
