<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Dash</title>
    <style>
        /* إلغاء أي فراغات تجعل الكرة تغرق */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { 
            width: 100%; 
            height: 100%; 
            overflow: hidden; 
            background-color: #050010; 
            position: fixed; /* يمنع التمرير للأسفل نهائياً */
        }
        canvas { 
            display: block; 
            width: 100vw; 
            height: 100vh; 
        }
        #gameOverUI {
            display: none;
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.85);
            padding: 30px; border-radius: 15px;
            text-align: center; color: white;
            font-family: Arial, sans-serif;
            border: 2px solid #00f2ff;
            width: 80%;
        }
        button {
            background: #00f2ff; border: none; padding: 12px 25px;
            font-size: 18px; font-weight: bold; border-radius: 8px;
            cursor: pointer; margin-top: 15px; width: 100%;
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>

    <div id="gameOverUI">
        <h2 style="color: #ff0055;">GAME OVER</h2>
        <p id="bestScore" style="font-size: 14px; opacity: 0.8;"></p>
        <p id="currentScore" style="font-size: 28px; margin: 10px 0;"></p>
        <button id="reviveBtn" onclick="reviveAction()">REVIVE (AD)</button>
        <button onclick="location.reload()">TRY AGAIN</button>
    </div>

    <script src="game.js"></script>
</body>
</html>
